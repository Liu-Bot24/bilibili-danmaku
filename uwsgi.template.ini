[uwsgi]
; Copy this file to uwsgi.ini after deployment and replace the example paths.
http = 127.0.0.1:5000
chdir = /path/to/bilibili_danmaku
wsgi-file = /path/to/bilibili_danmaku/app.py
callable = application
virtualenv = /path/to/venv
pidfile = /path/to/runtime/bilibili_danmaku.pid
daemonize = /path/to/logs/uwsgi.log
processes = 4
threads = 2
master = true
vacuum = true
die-on-term = true
enable-threads = true
need-app = true
harakiri = 900
http-timeout = 900
post-buffering = 4096
buffer-size = 65535
chmod-socket = 664
uid = www
gid = www
thunder-lock = true
max-requests = 5000
reload-on-rss = 1024
worker-reload-mercy = 60
; Runtime paths and secret/config files.
env = BILI_DANMAKU_PROJECT_ROOT=/path/to/bilibili_danmaku
env = BILI_DANMAKU_LOG_FILE=/path/to/bilibili_danmaku/app.log
env = BILI_DANMAKU_SECRET_FILE=/path/to/private/bilibili_danmaku.secrets.json
env = BILI_DANMAKU_MODEL_CONFIG_FILE=/path/to/private/bilibili_danmaku.model_config.json
env = BILI_DANMAKU_STATE_DB=/path/to/bilibili_danmaku/.state/bilibili_danmaku.sqlite3
